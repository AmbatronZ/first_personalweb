<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        * {
          box-sizing: border-box;
          margin: 0;
          padding: 0;
          font-family: 'Courier New', Courier, monospace;
        }

        audio {
          display: none;
        }

        body {
            background-image: url("/image/gutsgriffith2.jpg");
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-size: cover;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            min-height: 100vh;
        }

        body::before {
          content: "";
          position: absolute;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          background-image: inherit;
          background-repeat: no-repeat;
          background-attachment: fixed;
          background-size: cover;
          filter: blur(2px);
          z-index: -1;
        }

        .pixel-background {
          position: absolute;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          overflow: hidden;
          z-index: -1;
        }

        .pixel {
          position: absolute;
          width: 50px;
          height: 100px;
          background-image: url("/image/berserk.gif");
          background-size: cover;
          animation: fallAndRotate linear infinite;
        }

        @keyframes fallAndRotate {
          0% {
              transform: translateY(-10px) rotate(0deg);
              opacity: 1;
          }
          100% {
              transform: translateY(100vh) rotate(360deg);
              opacity: 0;
          }
        }

        .login-container {
          background-color: rgb(30, 90, 255);
          padding: 20px;
          border: 4px solid #000000;
          display: flex;
          flex-direction: column;
          align-items: center;
          width: 300px;
          text-align: center;
          color: #fff;
          z-index: 1;
          box-shadow: 8px 8px 0px #535353;
        }

        h2 {
          font-size: 24px;
          background-color: #780aff;
          color: #fff;
          padding: 10px;
          border: 4px solid #ffffff;
          box-shadow: 4px 4px 0px #000;
        }

        .input-container {
          margin-top: 15px;
          text-align: left;
          width: 100%;
        }

        label {
          display: block;
          font-size: 14px;
          margin-bottom: 5px;
        }

        input[type="text"],
        input[type="password"] {
          width: 100%;
          padding: 10px;
          border: none;
          background-color: #fffefe;
          color: #000000;
          font-size: 16px;
          outline: none;
          border: 4px solid #780aff;
          box-shadow: 4px 4px 0px #000;
          text-transform: uppercase;
        }

        button {
          margin-top: 20px;
          width: 100%;
          padding: 12px;
          background-color: #780aff;
          color: #fff;
          border: 4px solid #ffffff;
          cursor: pointer;
          font-size: 18px;
          text-transform: uppercase;
          box-shadow: 4px 4px 0px #000;
          transition: all 0.3s;
        }

        button:hover {
          background-color: #d1b113;
        }

        #errorMessage {
          color: #ff4d4d;
          font-size: 14px;
          margin-top: 10px;
        }
    </style>
</head>
<body>
    <audio controls autoplay loop>
        <source src="audio/pixemusic.mp3" type="audio/mpeg">
        Use Windows 10/11/better for best experience.
    </audio>

    <div class="pixel-background"></div>
    <div class="login-container">
        <h2>LOGIN</h2>
        <form id="loginForm" onsubmit="return validateForm()">
            <div class="input-container">
                <label for="username">Username</label>
                <input type="text" value="ambatron" id="username" name="username" required>
            </div>
            <div class="input-container">
                <label for="password">Password</label>
                <input type="password" value="admin123" id="password" name="password" required>
            </div>
            <button type="submit">LOGIN</button>
        </form>
        <p id="errorMessage"></p>
    </div>

    <script>
        function validateForm() {
          const username = document.getElementById('username').value;
          const password = document.getElementById('password').value;
          const errorMessage = document.getElementById('errorMessage');

          if (username === "ambatron" && password === "admin123") {
            window.location.href = '/admin.site.html';
            return false;
          } else {
            Swal.fire({
              title: "Jangan sok tau kamu",
              text: "Tanya ke admin ambatron buat dapet info login.",
              imageUrl: './image/ambatron',
              imageWidth: 400,
              imageHeight: 200,
              imageAlt: "salah besar"
            });
            return false;
          }
        }

        const pixelContainer = document.querySelector('.pixel-background');

        function createPixel() {
          const pixel = document.createElement('div');
          pixel.classList.add('pixel');
          pixel.style.left = `${Math.random() * 100}vw`;
          pixel.style.animationDuration = `${Math.random() * 2 + 5}s`;
          pixelContainer.appendChild(pixel);
          setTimeout(() => {
            pixel.remove();
          }, 5000);
        }

        setInterval(createPixel, 1000);
    </script>
</body>
</html>
