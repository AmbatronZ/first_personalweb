<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bootstrap personal web</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
  <style>
    /* Custom styling */
    .navbar {
      background: linear-gradient(45deg, rgb(29, 89, 255), #3aaaff);
      height: 80px;
      font-family: 'Poppins',sans-serif;
      font-size: 20px;
    }
    .navbar-brand {
      font-weight: bold;
      color: #ffffff;
    }
    .navbar-nav .nav-link {
      color: #ffffff;
      margin-right: 10px;
      transition: color 0.3s ease;
    }
    .navbar-nav .nav-link:hover {
      color: #ffdd57;
    }
    .dropdown-menu {
      background-color: #4e54c8;
      border: none;
    }
    .dropdown-menu .dropdown-item {
      color: #ffffff;
    }
    .dropdown-menu .dropdown-item:hover {
      background-color: #ffdd57;
      color: #4e54c8;
    }
    .btn-custom {
      background-color: #ffdd57;
      color: #4e54c8;
      border-radius: 20px;
      transition: background-color 0.3s ease;
    }
    .btn-custom:hover {
      background-color: #ffe884;
      color: #4e54c8;
    }
  </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark shadow">
  <div class="container">
    <a class="navbar-brand">Personal Web</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a class="nav-link active" aria-current="page" href="#">Home</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#">Biodata</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#">Portofolio</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#">Achievment</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="index.html">Contact</a>
        </li>
        <li class="nav-item dropdown">
          <a class="nav-link dropdown-toggle" href="#" id="navbarDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
            More
          </a>
          <ul class="dropdown-menu" aria-labelledby="navbarDropdown">
            <li><a class="dropdown-item" href="#">Form</a></li>
            <li><a class="dropdown-item" href="index.html">Games</a></li>
            <li><hr class="dropdown-divider"></li>
            <li><a class="dropdown-item" href="#">Philosophy</a></li>
          </ul>
        </li>
      </ul>
      <a href="index.html" class="btn btn-custom ms-3">Log Out</a>
    </div>
  </div>
</nav>

<!-- Optional JavaScript -->
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
